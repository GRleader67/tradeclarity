<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeClarity Pro</title>

<style>
:root{
--bg:#0b0f14;
--card:#11161d;
--text:#e6edf3;
--primary:#3b82f6;
--accent:#22c55e;
--danger:#ef4444;
--border:#222a33;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
padding:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
background:#161b22;
border:1px solid var(--border);
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.tabs button.active{
background:var(--primary);
}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid var(--border);
background:#0e131a;
color:white;
margin:5px;
}

button{
padding:8px 14px;
background:var(--primary);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid var(--border);
padding:8px;
text-align:center;
}

.green{color:var(--accent)}
.red{color:var(--danger)}
.hidden{display:none}

.dashboard{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.dash-card{
background:var(--card);
padding:15px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<h2>TradeClarity Pro</h2>

<div class="dashboard">
<div class="dash-card"><h4>Total Value</h4><p id="totalValue">$0</p></div>
<div class="dash-card"><h4>Total P/L</h4><p id="totalPL">$0</p></div>
<div class="dash-card"><h4>Win Rate</h4><p id="winRate">0%</p></div>
<div class="dash-card"><h4>Staking Rewards</h4><p id="stakingRewards">0</p></div>
</div>

<div class="tabs">
<button id="tab-stocks">Stocks</button>
<button id="tab-crypto">Crypto</button>
<button id="tab-options">Options</button>
<button id="tab-journal">Journal</button>
</div>

<div id="stocksPage" class="card">
<input id="ticker" placeholder="Ticker">
<input id="shares" type="number" placeholder="Shares">
<input id="avg" type="number" placeholder="Avg">
<input id="price" type="number" placeholder="Price">
<button id="saveStock">Save</button>
<table id="stocks"></table>
</div>

<div id="cryptoPage" class="card hidden">
<input id="cTicker"><input id="cAmount"><input id="cAvg"><input id="cPrice">
<button id="saveCrypto">Save</button>

<h4>Staking</h4>
<input id="sCoin"><input id="sAmount"><input id="sApy">
<button id="saveStaking">Save</button>

<table id="cryptoTable"></table>
<table id="stakingTable"></table>
</div>

<div id="optionsPage" class="card hidden">
<input id="oTicker"><input id="oContracts"><input id="oEntry"><input id="oPrice">
<button id="saveOptions">Save</button>
<table id="optionsTable"></table>
</div>

<div id="journalPage" class="card hidden">
<input id="jTicker">
<select id="jResult"><option>Win</option><option>Loss</option></select>
<input id="jNotes">
<button id="saveJournal">Save</button>
<table id="journalTable"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyBGxTOJXxuVgke3l_V16bQqubVw7CuHgVE",
authDomain:"tradeclarity-ad869.firebaseapp.com",
projectId:"tradeclarity-ad869"
});
const db = getFirestore(app);

/* DOM */
const $ = id => document.getElementById(id);

/* DATA */
let stocks=[],crypto=[],options=[],journal=[],staking=[];

/* SAFE LOAD */
async function load(col){
try{
const snap=await getDocs(collection(db,col));
return snap.docs.map(d=>d.data());
}catch(e){
console.error(e);
return [];
}
}

async function loadAll(){
stocks=await load("stocks");
crypto=await load("crypto");
options=await load("options");
journal=await load("journal");
staking=await load("staking");
render();
}

/* SAVE */
async function save(col,data){
try{
await addDoc(collection(db,col),data);
loadAll();
}catch(e){
alert("Firebase error → check rules");
console.error(e);
}
}

/* BUTTONS */
$("saveStock").onclick=()=>save("stocks",{ticker:$("ticker").value,shares:+$("shares").value,avg:+$("avg").value,price:+$("price").value});
$("saveCrypto").onclick=()=>save("crypto",{ticker:$("cTicker").value,amount:+$("cAmount").value,avg:+$("cAvg").value,price:+$("cPrice").value});
$("saveOptions").onclick=()=>save("options",{ticker:$("oTicker").value,contracts:+$("oContracts").value,entry:+$("oEntry").value,price:+$("oPrice").value});
$("saveJournal").onclick=()=>save("journal",{ticker:$("jTicker").value,result:$("jResult").value});
$("saveStaking").onclick=()=>save("staking",{coin:$("sCoin").value,amount:+$("sAmount").value,apy:+$("sApy").value});

/* TABS */
const tabs=["stocks","crypto","options","journal"];
tabs.forEach(t=>{
$("tab-"+t).onclick=()=>{
tabs.forEach(x=>{
$(x+"Page").classList.add("hidden");
$("tab-"+x).classList.remove("active");
});
$(t+"Page").classList.remove("hidden");
$("tab-"+t).classList.add("active");
};
});

/* RENDER */
function render(){

let total=0,pl=0,stake=0;

/* STOCKS */
$("stocks").innerHTML="<tr><th>Ticker</th><th>P/L</th></tr>";
stocks.forEach(s=>{
let shares=Number(s.shares)||0;
let price=Number(s.price)||0;
let avg=Number(s.avg)||0;
let p=(price-avg)*shares;
total+=shares*price; pl+=p;
$("stocks").innerHTML+=`<tr><td>${s.ticker||"-"}</td><td class="${p>=0?'green':'red'}">${p.toFixed(2)}</td></tr>`;
});

/* CRYPTO */
$("cryptoTable").innerHTML="<tr><th>Coin</th><th>P/L</th></tr>";
crypto.forEach(c=>{
let amt=Number(c.amount)||0;
let price=Number(c.price)||0;
let avg=Number(c.avg)||0;
let p=(price-avg)*amt;
total+=amt*price; pl+=p;
$("cryptoTable").innerHTML+=`<tr><td>${c.ticker||"-"}</td><td>${p.toFixed(2)}</td></tr>`;
});

/* OPTIONS */
$("optionsTable").innerHTML="<tr><th>Ticker</th><th>P/L</th></tr>";
options.forEach(o=>{
let contracts=Number(o.contracts)||0;
let entry=Number(o.entry)||0;
let price=Number(o.price)||0;
let p=(price-entry)*contracts*100;
pl+=p;
$("optionsTable").innerHTML+=`<tr><td>${o.ticker||"-"}</td><td>${p.toFixed(2)}</td></tr>`;
});

/* JOURNAL */
$("journalTable").innerHTML="<tr><th>Ticker</th><th>Result</th></tr>";
journal.forEach(j=>{
$("journalTable").innerHTML+=`<tr><td>${j.ticker||"-"}</td><td>${j.result||"-"}</td></tr>`;
});

/* STAKING */
$("stakingTable").innerHTML="<tr><th>Coin</th><th>Rewards</th></tr>";
staking.forEach(s=>{
let amt=Number(s.amount)||0;
let apy=Number(s.apy)||0;
let r=amt*(apy/100);
stake+=r;
$("stakingTable").innerHTML+=`<tr><td>${s.coin||"-"}</td><td>${r.toFixed(4)}</td></tr>`;
});

/* DASHBOARD */
$("totalValue").innerText="$"+total.toFixed(2);
$("totalPL").innerText="$"+pl.toFixed(2);
$("stakingRewards").innerText=stake.toFixed(4);

let wins=journal.filter(j=>j.result==="Win").length;
$("winRate").innerText=journal.length?Math.round(wins/journal.length*100)+"%":"0%";
}

/* INIT */
loadAll();

</script>

</body>
</html>
