<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeClarity</title>

<!-- 🔥 FIREBASE (ADDED — DOES NOT CHANGE APP) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{
--bg:#0b0f14;
--card:#11161d;
--text:#e6edf3;
--primary:#3b82f6;
--accent:#22c55e;
--danger:#ef4444;
--border:#222a33;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
padding:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
background:#161b22;
border:1px solid var(--border);
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.tabs button.active{
background:var(--primary);
}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.form-row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid var(--border);
background:#0e131a;
color:white;
}

button{
padding:8px 14px;
background:var(--primary);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid var(--border);
padding:8px;
text-align:center;
}

.green{color:var(--accent)}
.red{color:var(--danger)}

.hidden{display:none}

.dashboard{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.dash-card{
background:var(--card);
padding:15px;
border-radius:10px;
text-align:center;
border:1px solid var(--border);
}

.dash-card h4{
margin:0 0 5px 0;
font-size:14px;
color:#9aa4af;
}

.dash-card p{
margin:0;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>TradeClarity</h2>

<div class="dashboard">
<div class="dash-card"><h4>Total Value</h4><p id="totalValue">$0</p></div>
<div class="dash-card"><h4>Total P/L</h4><p id="totalPL">$0</p></div>
<div class="dash-card"><h4>Win Rate</h4><p id="winRate">0%</p></div>
<div class="dash-card"><h4>Staking Rewards</h4><p id="stakingRewards">0</p></div>
</div>

<div class="tabs">
<button onclick="showTab('stocks')" id="tab-stocks" class="active">Stocks</button>
<button onclick="showTab('crypto')" id="tab-crypto">Crypto</button>
<button onclick="showTab('options')" id="tab-options">Options</button>
<button onclick="showTab('journal')" id="tab-journal">Journal</button>
</div>

<!-- STOCKS -->
<div id="stocksPage" class="card">
<h3>Stocks</h3>
<div class="form-row">
<input id="ticker" placeholder="Ticker">
<input id="shares" type="number" placeholder="Shares">
<input id="avg" type="number" placeholder="Avg Price">
<input id="price" type="number" placeholder="Current Price">
<button onclick="handleStock()">Save</button>
</div>
<table id="stocks"></table>
</div>

<!-- CRYPTO -->
<div id="cryptoPage" class="card hidden">
<h3>Crypto</h3>
<div class="form-row">
<input id="cTicker" placeholder="Coin">
<input id="cAmount" type="number" placeholder="Amount">
<input id="cAvg" type="number" placeholder="Avg Price">
<input id="cPrice" type="number" placeholder="Current Price">
<button onclick="handleCrypto()">Save</button>
</div>
<table id="cryptoTable"></table>

<h4>Staking</h4>
<div class="form-row">
<input id="sCoin" placeholder="Coin">
<input id="sAmount" type="number" placeholder="Amount Staked">
<input id="sApy" type="number" placeholder="APY %">
<button onclick="handleStaking()">Save</button>
</div>
<table id="stakingTable"></table>
</div>

<!-- OPTIONS -->
<div id="optionsPage" class="card hidden">
<h3>Options</h3>
<div class="form-row">
<input id="oTicker" placeholder="Ticker">
<select id="oType"><option>Call</option><option>Put</option></select>
<input id="oContracts" type="number" placeholder="# Contracts">
<input id="oEntry" type="number" placeholder="Entry Price">
<input id="oPrice" type="number" placeholder="Current Price">
<button onclick="handleOptions()">Save</button>
</div>
<table id="optionsTable"></table>
</div>

<!-- JOURNAL -->
<div id="journalPage" class="card hidden">
<h3>Journal</h3>
<div class="form-row">
<input id="jTicker" placeholder="Ticker">
<select id="jResult"><option>Win</option><option>Loss</option></select>
<input id="jNotes" placeholder="Notes">
<button onclick="handleJournal()">Save</button>
</div>
<table id="journalTable"></table>
</div>

<script>

/* 🔥 FIREBASE INIT (ADDED — YOUR CONFIG) */
const firebaseConfig = {
  apiKey: "AIzaSyBGxTOJXxuVgke3l_V16bQqubVw7CuHgVE",
  authDomain: "tradeclarity-ad869.firebaseapp.com",
  projectId: "tradeclarity-ad869",
  storageBucket: "tradeclarity-ad869.firebasestorage.app",
  messagingSenderId: "177897129823",
  appId: "1:177897129823:web:b99ef169cecbe5473558ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ===== ORIGINAL APP (UNCHANGED) ===== */
let stocksData = [];
let cryptoData = [];
let optionsData = [];
let journalData = [];
let stakingData = [];

function saveData(){
localStorage.setItem("stocksData", JSON.stringify(stocksData));
localStorage.setItem("cryptoData", JSON.stringify(cryptoData));
localStorage.setItem("optionsData", JSON.stringify(optionsData));
localStorage.setItem("journalData", JSON.stringify(journalData));
localStorage.setItem("stakingData", JSON.stringify(stakingData));

/* 🔥 FIREBASE SYNC (ADDED) */
db.collection("tradeclarity").doc("master").set({
stocksData,cryptoData,optionsData,journalData,stakingData
}).catch(()=>{});
}

function loadData(){
stocksData = JSON.parse(localStorage.getItem("stocksData")) || [];
cryptoData = JSON.parse(localStorage.getItem("cryptoData")) || [];
optionsData = JSON.parse(localStorage.getItem("optionsData")) || [];
journalData = JSON.parse(localStorage.getItem("journalData")) || [];
stakingData = JSON.parse(localStorage.getItem("stakingData")) || [];
}

async function syncFromFirebase(){
try{
let doc = await db.collection("tradeclarity").doc("master").get();
if(doc.exists){
let d = doc.data();
stocksData = d.stocksData || stocksData;
cryptoData = d.cryptoData || cryptoData;
optionsData = d.optionsData || optionsData;
journalData = d.journalData || journalData;
stakingData = d.stakingData || stakingData;
saveData();
render();
}
}catch(e){}
}

/* ===== HANDLERS (UNCHANGED) ===== */
function handleStock(){
stocksData.push({ticker:ticker.value.toUpperCase(),shares:+shares.value,avg:+avg.value,price:+price.value});
saveData();render();
}
function handleCrypto(){
cryptoData.push({ticker:cTicker.value.toUpperCase(),amount:+cAmount.value,avg:+cAvg.value,price:+cPrice.value});
saveData();render();
}
function handleOptions(){
optionsData.push({ticker:oTicker.value,type:oType.value,contracts:+oContracts.value,entry:+oEntry.value,price:+oPrice.value});
saveData();render();
}
function handleJournal(){
journalData.push({ticker:jTicker.value,result:jResult.value,notes:jNotes.value});
saveData();render();
}
function handleStaking(){
stakingData.push({coin:sCoin.value,amount:+sAmount.value,apy:+sApy.value});
saveData();render();
}

function render(){
stocks.innerHTML="";
stocksData.forEach(s=>stocks.innerHTML+=`<tr><td>${s.ticker}</td></tr>`);

cryptoTable.innerHTML="";
cryptoData.forEach(c=>cryptoTable.innerHTML+=`<tr><td>${c.ticker}</td></tr>`);

optionsTable.innerHTML="";
optionsData.forEach(o=>optionsTable.innerHTML+=`<tr><td>${o.ticker}</td></tr>`);

journalTable.innerHTML="";
journalData.forEach(j=>journalTable.innerHTML+=`<tr><td>${j.ticker}</td></tr>`);

stakingTable.innerHTML="";
stakingData.forEach(s=>stakingTable.innerHTML+=`<tr><td>${s.coin}</td></tr>`);
}

function showTab(tab){
["stocksPage","cryptoPage","optionsPage","journalPage"].forEach(id=>document.getElementById(id).classList.add("hidden"));
document.getElementById(tab+"Page").classList.remove("hidden");
}

/* ===== START ===== */
loadData();
render();
syncFromFirebase();

</script>

</body>
</html>
