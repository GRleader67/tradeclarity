<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeClarity</title>

<style>
:root{
  --primary:#238636;
  --border:#30363d;
  --card:#161b22;
  --accent:#2ea043;
  --danger:#da3633;
}

body{
  font-family:Arial;
  background:#0d1117;
  color:white;
  padding:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.form-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

input,select{
  padding:8px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#0e131a;
  color:white;
}

button{
  padding:8px 14px;
  background:var(--primary);
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid var(--border);
  padding:8px;
  text-align:center;
}

.green{color:var(--accent)}
.red{color:var(--danger)}
</style>
</head>

<body>

<h2>TradeClarity (Full Cloud System)</h2>

<button onclick="testFirebase()">Test Firebase</button>

<!-- STOCKS -->
<div class="card">
<h3>Stocks</h3>
<div class="form-row">
<input id="s_ticker" placeholder="Ticker">
<input id="s_shares" type="number" placeholder="Shares">
<input id="s_avg" type="number" placeholder="Avg">
<input id="s_price" type="number" placeholder="Price">
<button onclick="addStock()">Save</button>
</div>
<table id="stocksTable"></table>
</div>

<!-- CRYPTO -->
<div class="card">
<h3>Crypto</h3>
<div class="form-row">
<input id="c_coin" placeholder="Coin">
<input id="c_amount" type="number" placeholder="Amount">
<input id="c_avg" type="number" placeholder="Avg">
<input id="c_price" type="number" placeholder="Price">
<button onclick="addCrypto()">Save</button>
</div>
<table id="cryptoTable"></table>
</div>

<!-- STAKING -->
<div class="card">
<h3>Staking</h3>
<div class="form-row">
<input id="st_coin" placeholder="Coin">
<input id="st_amount" type="number" placeholder="Amount">
<input id="st_apy" type="number" placeholder="APY %">
<button onclick="addStaking()">Save</button>
</div>
<table id="stakingTable"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = { 
  apiKey: "AIzaSyBGxTOJXxuVgke3l_V16bQqubVw7CuHgVE",
  authDomain: "tradeclarity-ad869.firebaseapp.com",
  projectId: "tradeclarity-ad869",
  storageBucket: "tradeclarity-ad869.firebasestorage.app",
  messagingSenderId: "177897129823",
  appId: "1:177897129823:web:b99ef169cecbe5473558ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== DATA ===== */
let stocks=[], crypto=[], staking=[];

/* ===== ADD FUNCTIONS ===== */
window.addStock = async ()=>{
let d={
ticker:s_ticker.value.toUpperCase(),
shares:+s_shares.value,
avg:+s_avg.value,
price:+s_price.value
};
let ref=await addDoc(collection(db,"stocks"),d);
d.id=ref.id;
stocks.push(d);
render();
};

window.addCrypto = async ()=>{
let d={
coin:c_coin.value.toUpperCase(),
amount:+c_amount.value,
avg:+c_avg.value,
price:+c_price.value
};
let ref=await addDoc(collection(db,"crypto"),d);
d.id=ref.id;
crypto.push(d);
render();
};

window.addStaking = async ()=>{
let d={
coin:st_coin.value.toUpperCase(),
amount:+st_amount.value,
apy:+st_apy.value
};
let ref=await addDoc(collection(db,"staking"),d);
d.id=ref.id;
staking.push(d);
render();
};

/* ===== LOAD ===== */
async function loadAll(){

let s=await getDocs(collection(db,"stocks"));
stocks=s.docs.map(d=>({...d.data(),id:d.id}));

let c=await getDocs(collection(db,"crypto"));
crypto=c.docs.map(d=>({...d.data(),id:d.id}));

let st=await getDocs(collection(db,"staking"));
staking=st.docs.map(d=>({...d.data(),id:d.id}));

render();
}

/* ===== DELETE ===== */
window.del = async (col,id)=>{
await deleteDoc(doc(db,col,id));
loadAll();
};

/* ===== RENDER ===== */
function render(){

stocksTable.innerHTML=`<tr><th>Ticker</th><th>P/L</th><th></th></tr>`;
stocks.forEach(s=>{
let pl=(s.price-s.avg)*s.shares;
stocksTable.innerHTML+=`<tr>
<td>${s.ticker}</td>
<td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td>
<td><button onclick="del('stocks','${s.id}')">X</button></td>
</tr>`;
});

cryptoTable.innerHTML=`<tr><th>Coin</th><th>P/L</th><th></th></tr>`;
crypto.forEach(c=>{
let pl=(c.price-c.avg)*c.amount;
cryptoTable.innerHTML+=`<tr>
<td>${c.coin}</td>
<td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td>
<td><button onclick="del('crypto','${c.id}')">X</button></td>
</tr>`;
});

stakingTable.innerHTML=`<tr><th>Coin</th><th>Rewards</th><th></th></tr>`;
staking.forEach(s=>{
let r=s.amount*(s.apy/100);
stakingTable.innerHTML+=`<tr>
<td>${s.coin}</td>
<td>${r.toFixed(4)}</td>
<td><button onclick="del('staking','${s.id}')">X</button></td>
</tr>`;
});

}

/* ===== TEST ===== */
window.testFirebase = async ()=>{
await addDoc(collection(db,"test"),{msg:"ok"});
alert("Firebase connected");
};

/* INIT */
loadAll();

</script>

</body>
</html>
