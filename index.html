<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE INIT */
const firebaseConfig = { 
  apiKey: "AIzaSyBGxTOJXxuVgke3l_V16bQqubVw7CuHgVE",
  authDomain: "tradeclarity-ad869.firebaseapp.com",
  projectId: "tradeclarity-ad869"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== DATA ===== */
let stocksData=[], cryptoData=[], optionsData=[], journalData=[], stakingData=[];

/* ===== LOAD FROM FIREBASE ===== */
async function loadAll(){
  stocksData = await loadCollection("stocks");
  cryptoData = await loadCollection("crypto");
  optionsData = await loadCollection("options");
  journalData = await loadCollection("journal");
  stakingData = await loadCollection("staking");
  render();
}

async function loadCollection(name){
  const snap = await getDocs(collection(db,name));
  return snap.docs.map(d=>({...d.data(), id:d.id}));
}

/* ===== SAVE ===== */
async function saveItem(col,data){
  const ref = await addDoc(collection(db,col),data);
  data.id = ref.id;
  return data;
}

/* ===== DELETE ===== */
window.deleteItem = async function(col,id){
  await deleteDoc(doc(db,col,id));
  loadAll();
};

/* ===== STOCKS ===== */
window.handleStock = async function(){
  const data = {
    ticker: ticker.value.toUpperCase(),
    shares:+shares.value,
    avg:+avg.value,
    price:+price.value
  };
  await saveItem("stocks",data);
  loadAll();
};

/* ===== CRYPTO ===== */
window.handleCrypto = async function(){
  const data = {
    ticker:cTicker.value.toUpperCase(),
    amount:+cAmount.value,
    avg:+cAvg.value,
    price:+cPrice.value
  };
  await saveItem("crypto",data);
  loadAll();
};

/* ===== OPTIONS ===== */
window.handleOptions = async function(){
  const data = {
    ticker:oTicker.value.toUpperCase(),
    type:oType.value,
    contracts:+oContracts.value,
    entry:+oEntry.value,
    price:+oPrice.value
  };
  await saveItem("options",data);
  loadAll();
};

/* ===== JOURNAL ===== */
window.handleJournal = async function(){
  const data = {
    ticker:jTicker.value.toUpperCase(),
    result:jResult.value,
    notes:jNotes.value
  };
  await saveItem("journal",data);
  loadAll();
};

/* ===== STAKING ===== */
window.handleStaking = async function(){
  const data = {
    coin:sCoin.value.toUpperCase(),
    amount:+sAmount.value,
    apy:+sApy.value
  };
  await saveItem("staking",data);
  loadAll();
};

/* ===== RENDER (UPGRADED ANALYTICS) ===== */
function render(){

/* STOCKS */
stocks.innerHTML=`<tr>
<th>Ticker</th><th>Shares</th><th>Value</th><th>P/L</th><th></th>
</tr>`;

let best=-999999,worst=999999;

stocksData.forEach(s=>{
let value=s.shares*s.price;
let pl=(s.price-s.avg)*s.shares;

best=Math.max(best,pl);
worst=Math.min(worst,pl);

stocks.innerHTML+=`<tr>
<td>${s.ticker}</td>
<td>${s.shares}</td>
<td>$${value.toFixed(2)}</td>
<td class="${pl>=0?'green':'red'}">$${pl.toFixed(2)}</td>
<td><button onclick="deleteItem('stocks','${s.id}')">X</button></td>
</tr>`;
});

/* CRYPTO */
cryptoTable.innerHTML=`<tr>
<th>Coin</th><th>Value</th><th>P/L</th><th></th>
</tr>`;

cryptoData.forEach(c=>{
let value=c.amount*c.price;
let pl=(c.price-c.avg)*c.amount;

cryptoTable.innerHTML+=`<tr>
<td>${c.ticker}</td>
<td>$${value.toFixed(2)}</td>
<td class="${pl>=0?'green':'red'}">$${pl.toFixed(2)}</td>
<td><button onclick="deleteItem('crypto','${c.id}')">X</button></td>
</tr>`;
});

/* OPTIONS */
optionsTable.innerHTML=`<tr>
<th>Ticker</th><th>P/L</th><th></th>
</tr>`;

optionsData.forEach(o=>{
let pl=(o.price-o.entry)*o.contracts*100;
optionsTable.innerHTML+=`<tr>
<td>${o.ticker}</td>
<td class="${pl>=0?'green':'red'}">$${pl.toFixed(2)}</td>
<td><button onclick="deleteItem('options','${o.id}')">X</button></td>
</tr>`;
});

/* JOURNAL */
journalTable.innerHTML=`<tr>
<th>Ticker</th><th>Result</th><th></th>
</tr>`;

journalData.forEach(j=>{
journalTable.innerHTML+=`<tr>
<td>${j.ticker}</td>
<td>${j.result}</td>
<td><button onclick="deleteItem('journal','${j.id}')">X</button></td>
</tr>`;
});

/* STAKING */
stakingTable.innerHTML=`<tr>
<th>Coin</th><th>Rewards</th><th></th>
</tr>`;

let stakeTotal=0;

stakingData.forEach(s=>{
let r=s.amount*(s.apy/100);
stakeTotal+=r;

stakingTable.innerHTML+=`<tr>
<td>${s.coin}</td>
<td>${r.toFixed(4)}</td>
<td><button onclick="deleteItem('staking','${s.id}')">X</button></td>
</tr>`;
});

/* DASHBOARD */
let total=0,pl=0;

stocksData.forEach(s=>{total+=s.shares*s.price;pl+=(s.price-s.avg)*s.shares;});
cryptoData.forEach(c=>{total+=c.amount*c.price;pl+=(c.price-c.avg)*c.amount;});

let wins=journalData.filter(j=>j.result==="Win").length;
let winRate=journalData.length?((wins/journalData.length)*100).toFixed(0):0;

totalValue.innerText="$"+total.toFixed(2);
totalPL.innerText="$"+pl.toFixed(2);
stakingRewards.innerText=stakeTotal.toFixed(4);
winRateEl.innerText=winRate+"%";

/* PRO ANALYTICS ADD */
console.log("Best Trade:",best.toFixed(2));
console.log("Worst Trade:",worst.toFixed(2));
}

/* INIT */
loadAll();

</script>
