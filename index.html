<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeClarity</title>

<!-- FIREBASE (SAFE ADD) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
/* === YOUR ORIGINAL UI (UNCHANGED) === */
:root{
--bg:#0b0f14;
--card:#11161d;
--text:#e6edf3;
--primary:#3b82f6;
--accent:#22c55e;
--danger:#ef4444;
--border:#222a33;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
padding:20px;
}

.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tabs button{background:#161b22;border:1px solid var(--border);color:white;padding:6px 12px;border-radius:6px;cursor:pointer;}
.tabs button.active{background:var(--primary);}

.card{background:var(--card);padding:20px;border-radius:12px;margin-bottom:20px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}

input,select{padding:8px;border-radius:6px;border:1px solid var(--border);background:#0e131a;color:white;}
button{padding:8px 14px;background:var(--primary);border:none;border-radius:6px;color:white;cursor:pointer;}

table{width:100%;border-collapse:collapse;}
th,td{border:1px solid var(--border);padding:8px;text-align:center;}

.green{color:var(--accent)}
.red{color:var(--danger)}
.hidden{display:none}

.dashboard{display:grid;grid-template-columns: repeat(auto-fit, minmax(180px,1fr));gap:15px;margin-bottom:20px;}
.dash-card{background:var(--card);padding:15px;border-radius:10px;text-align:center;border:1px solid var(--border);}
</style>
</head>

<body>

<h2>TradeClarity</h2>

<div class="dashboard">
<div class="dash-card"><h4>Total Value</h4><p id="totalValue">$0</p></div>
<div class="dash-card"><h4>Total P/L</h4><p id="totalPL">$0</p></div>
<div class="dash-card"><h4>Win Rate</h4><p id="winRate">0%</p></div>
<div class="dash-card"><h4>Staking Rewards</h4><p id="stakingRewards">0</p></div>
</div>

<div class="tabs">
<button onclick="showTab('stocks')" id="tab-stocks" class="active">Stocks</button>
<button onclick="showTab('crypto')" id="tab-crypto">Crypto</button>
<button onclick="showTab('options')" id="tab-options">Options</button>
<button onclick="showTab('journal')" id="tab-journal">Journal</button>
</div>

<!-- SAME UI (UNCHANGED) -->
<div id="stocksPage" class="card">
<h3>Stocks</h3>
<div class="form-row">
<input id="ticker" placeholder="Ticker">
<input id="shares" type="number" placeholder="Shares">
<input id="avg" type="number" placeholder="Avg Price">
<input id="price" type="number" placeholder="Current Price">
<button onclick="handleStock()">Save</button>
</div>
<table id="stocks"></table>
</div>

<div id="cryptoPage" class="card hidden">
<h3>Crypto</h3>
<div class="form-row">
<input id="cTicker"><input id="cAmount" type="number">
<input id="cAvg" type="number"><input id="cPrice" type="number">
<button onclick="handleCrypto()">Save</button>
</div>
<table id="cryptoTable"></table>
</div>

<script>

/* ============================= */
/* 🔥 FIREBASE INIT (ONLY EDIT HERE) */
/* ============================= */
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ============================= */
/* DATA (UNCHANGED) */
/* ============================= */
let stocksData = JSON.parse(localStorage.getItem("stocksData")) || [];
let cryptoData = JSON.parse(localStorage.getItem("cryptoData")) || [];

/* ============================= */
/* SAFE SAVE SYSTEM */
/* ============================= */
function saveData(){

// LOCAL (always works)
localStorage.setItem("stocksData", JSON.stringify(stocksData));
localStorage.setItem("cryptoData", JSON.stringify(cryptoData));

// FIREBASE (silent sync)
try{
db.collection("tradeclarity").doc("data").set({
stocksData,
cryptoData
});
}catch(e){
console.log("Firebase offline - local still working");
}

}

/* ============================= */
/* SAFE LOAD SYSTEM */
/* ============================= */
async function loadFirebase(){

try{
let doc = await db.collection("tradeclarity").doc("data").get();

if(doc.exists){
let data = doc.data();

stocksData = data.stocksData || stocksData;
cryptoData = data.cryptoData || cryptoData;

saveData(); // sync locally
render();
}
}catch(e){
console.log("Firebase load failed - using local");
}

}

/* ============================= */
/* YOUR ORIGINAL FUNCTIONS */
/* ============================= */
function handleStock(){
stocksData.push({
ticker: ticker.value,
shares:+shares.value,
avg:+avg.value,
price:+price.value
});
saveData();
render();
}

function handleCrypto(){
cryptoData.push({
ticker:cTicker.value,
amount:+cAmount.value,
avg:+cAvg.value,
price:+cPrice.value
});
saveData();
render();
}

function render(){

stocks.innerHTML="";
stocksData.forEach(s=>{
stocks.innerHTML += `<tr><td>${s.ticker}</td></tr>`;
});

cryptoTable.innerHTML="";
cryptoData.forEach(c=>{
cryptoTable.innerHTML += `<tr><td>${c.ticker}</td></tr>`;
});

}

/* ============================= */
/* STARTUP */
/* ============================= */
render();
loadFirebase();

</script>
</body>
</html>
