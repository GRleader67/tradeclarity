<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeClarity</title>

<style>
:root{
--bg:#0b0f14;
--card:#11161d;
--text:#e6edf3;
--primary:#3b82f6;
--accent:#22c55e;
--danger:#ef4444;
--border:#222a33;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
padding:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
background:#161b22;
border:1px solid var(--border);
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.tabs button.active{
background:var(--primary);
}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.form-row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid var(--border);
background:#0e131a;
color:white;
}

button{
padding:8px 14px;
background:var(--primary);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid var(--border);
padding:8px;
text-align:center;
}

.green{color:var(--accent)}
.red{color:var(--danger)}

.hidden{display:none}
/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.dash-card{
background:var(--card);
padding:15px;
border-radius:10px;
text-align:center;
border:1px solid var(--border);
}

.dash-card h4{
margin:0 0 5px 0;
font-size:14px;
color:#9aa4af;
}

.dash-card p{
margin:0;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>TradeClarity</h2>

<div class="dashboard">

  <div class="dash-card">
    <h4>Total Value</h4>
    <p id="totalValue">$0</p>
  </div>

  <div class="dash-card">
    <h4>Total P/L</h4>
    <p id="totalPL">$0</p>
  </div>

  <div class="dash-card">
    <h4>Win Rate</h4>
    <p id="winRate">0%</p>
  </div>

  <div class="dash-card">
    <h4>Staking Rewards</h4>
    <p id="stakingRewards">0</p>
  </div>

</div>

<div class="tabs">
<button onclick="showTab('stocks')" id="tab-stocks" class="active">Stocks</button>
<button onclick="showTab('crypto')" id="tab-crypto">Crypto</button>
<button onclick="showTab('options')" id="tab-options">Options</button>
<button onclick="showTab('journal')" id="tab-journal">Journal</button>
</div>

<!-- STOCKS -->
<div id="stocksPage" class="card">
<h3>Stocks</h3>

<div class="form-row">
<input id="ticker" placeholder="Ticker">
<input id="shares" type="number" placeholder="Shares">
<input id="avg" type="number" placeholder="Avg Price">
<input id="price" type="number" placeholder="Current Price">
<button onclick="handleStock()">Save</button>
</div>

<table id="stocks"></table>
</div>

<!-- CRYPTO -->
<div id="cryptoPage" class="card hidden">
<h3>Crypto</h3>

<div class="form-row">
<input id="cTicker" placeholder="Coin">
<input id="cAmount" type="number" placeholder="Amount">
<input id="cAvg" type="number" placeholder="Avg Price">
<input id="cPrice" type="number" placeholder="Current Price">
<button onclick="handleCrypto()">Save</button>
</div>

<table id="cryptoTable"></table>

<h4>Staking</h4>

<div class="form-row">
<input id="sCoin" placeholder="Coin">
<input id="sAmount" type="number" placeholder="Amount Staked">
<input id="sApy" type="number" placeholder="APY %">
<button onclick="handleStaking()">Save</button>
</div>

<table id="stakingTable"></table>
</div>

<!-- OPTIONS -->
<div id="optionsPage" class="card hidden">
<h3>Options</h3>

<div class="form-row">
<input id="oTicker" placeholder="Ticker">
<select id="oType">
<option>Call</option>
<option>Put</option>
</select>
<input id="oContracts" type="number" placeholder="# Contracts">
<input id="oEntry" type="number" placeholder="Entry Price">
<input id="oPrice" type="number" placeholder="Current Price">
<button onclick="handleOptions()">Save</button>
</div>

<table id="optionsTable"></table>
</div>
<!-- JOURNAL -->
<div id="journalPage" class="card hidden">
<h3>Journal</h3>

<div class="form-row">
<input id="jTicker" placeholder="Ticker">
<select id="jResult">
<option>Win</option>
<option>Loss</option>
</select>
<input id="jNotes" placeholder="Notes">
<button onclick="handleJournal()">Save</button>
</div>

<table id="journalTable"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = { 
  apiKey: "AIzaSyBGxTOJXxuVgke3l_V16bQqubVw7CuHgVE",
  authDomain: "tradeclarity-ad869.firebaseapp.com",
  projectId: "tradeclarity-ad869"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= DATA ================= */
let stocksData = [];
let cryptoData = [];
let optionsData = [];
let journalData = [];
let stakingData = [];

/* ================= STATE ================= */
let appState = {
  mode: "add",
  editIndex: null,
  editId: null,
  collection: null
};

/* ================= TAB SYSTEM (UNCHANGED) ================= */
window.showTab = function(tab){
  ["stocksPage","cryptoPage","optionsPage","journalPage"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(tab+"Page").classList.remove("hidden");

  ["stocks","crypto","options","journal"].forEach(id=>{
    document.getElementById("tab-"+id).classList.remove("active");
  });
  document.getElementById("tab-"+tab).classList.add("active");
};

/* ================= FIREBASE LOAD ================= */
async function loadCollection(name){
  try{
    const snap = await getDocs(collection(db,name));
    return snap.docs.map(d=>({...d.data(), id:d.id}));
  }catch(e){
    console.error("LOAD ERROR:", e);
    return [];
  }
}

async function loadAll(){
  stocksData = await loadCollection("stocks");
  cryptoData = await loadCollection("crypto");
  optionsData = await loadCollection("options");
  journalData = await loadCollection("journal");
  stakingData = await loadCollection("staking");
  render();
}

/* ================= SAVE ================= */
async function saveItem(col, data){

  try{

    if(appState.mode === "edit"){
      await updateDoc(doc(db,col,appState.editId), data);
    } else {
      await addDoc(collection(db,col), data);
    }

    resetState();
    loadAll();

  }catch(e){
    console.error("SAVE ERROR:", e);
    alert("Firebase error — check rules");
  }
}

/* ================= DELETE ================= */
window.deleteItem = async function(col,id){
  if(!confirm("Delete this item?")) return;
  await deleteDoc(doc(db,col,id));
  loadAll();
};

/* ================= STOCKS ================= */
window.handleStock = function(){

  const data = {
    ticker: ticker.value.toUpperCase(),
    shares: +shares.value,
    avg: +avg.value,
    price: +price.value
  };

  appState.collection = "stocks";
  saveItem("stocks", data);
  resetStockForm();
};

/* ================= CRYPTO ================= */
window.handleCrypto = function(){

  const data = {
    ticker: cTicker.value.toUpperCase(),
    amount: +cAmount.value,
    avg: +cAvg.value,
    price: +cPrice.value
  };

  saveItem("crypto", data);
  resetCryptoForm();
};

/* ================= OPTIONS ================= */
window.handleOptions = function(){

  const data = {
    ticker: oTicker.value.toUpperCase(),
    type: oType.value,
    contracts: +oContracts.value,
    entry: +oEntry.value,
    price: +oPrice.value
  };

  saveItem("options", data);
  resetOptionsForm();
};

/* ================= JOURNAL ================= */
window.handleJournal = function(){

  const data = {
    ticker: jTicker.value.toUpperCase(),
    result: jResult.value,
    notes: jNotes.value
  };

  saveItem("journal", data);
  resetJournalForm();
};

/* ================= STAKING ================= */
window.handleStaking = function(){

  const data = {
    coin: sCoin.value.toUpperCase(),
    amount: +sAmount.value,
    apy: +sApy.value
  };

  saveItem("staking", data);
  resetStakingForm();
};

/* ================= RESET STATE ================= */
function resetState(){
  appState.mode = "add";
  appState.editIndex = null;
  appState.editId = null;
}

/* ================= ORIGINAL RESET FUNCTIONS (UNCHANGED) ================= */
function resetStockForm(){ ticker.value=""; shares.value=""; avg.value=""; price.value=""; }
function resetCryptoForm(){ cTicker.value=""; cAmount.value=""; cAvg.value=""; cPrice.value=""; }
function resetOptionsForm(){ oTicker.value=""; oContracts.value=""; oEntry.value=""; oPrice.value=""; }
function resetJournalForm(){ jTicker.value=""; jNotes.value=""; }
function resetStakingForm(){ sCoin.value=""; sAmount.value=""; sApy.value=""; }

/* ================= RENDER (SAFE VERSION) ================= */
function render(){

const stocksEl = document.getElementById("stocks");
const cryptoEl = document.getElementById("cryptoTable");
const optionsEl = document.getElementById("optionsTable");
const journalEl = document.getElementById("journalTable");
const stakingEl = document.getElementById("stakingTable");

let totalValue = 0;
let totalPL = 0;
let stakingRewards = 0;

/* STOCKS */
stocksEl.innerHTML = `<tr><th>Ticker</th><th>P/L</th><th></th></tr>`;

stocksData.forEach(s=>{
  let shares = Number(s.shares)||0;
  let price = Number(s.price)||0;
  let avg = Number(s.avg)||0;

  let pl = (price-avg)*shares;

  totalValue += shares*price;
  totalPL += pl;

  stocksEl.innerHTML += `
  <tr>
    <td>${s.ticker}</td>
    <td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td>
    <td><button onclick="deleteItem('stocks','${s.id}')">X</button></td>
  </tr>`;
});

/* CRYPTO */
cryptoEl.innerHTML = `<tr><th>Coin</th><th>P/L</th><th></th></tr>`;

cryptoData.forEach(c=>{
  let amt = Number(c.amount)||0;
  let price = Number(c.price)||0;
  let avg = Number(c.avg)||0;

  let pl = (price-avg)*amt;

  totalValue += amt*price;
  totalPL += pl;

  cryptoEl.innerHTML += `
  <tr>
    <td>${c.ticker}</td>
    <td>${pl.toFixed(2)}</td>
    <td><button onclick="deleteItem('crypto','${c.id}')">X</button></td>
  </tr>`;
});

/* OPTIONS */
optionsEl.innerHTML = `<tr><th>Ticker</th><th>P/L</th><th></th></tr>`;

optionsData.forEach(o=>{
  let pl = (o.price-o.entry)*o.contracts*100;
  totalPL += pl;

  optionsEl.innerHTML += `
  <tr>
    <td>${o.ticker}</td>
    <td>${pl.toFixed(2)}</td>
    <td><button onclick="deleteItem('options','${o.id}')">X</button></td>
  </tr>`;
});

/* JOURNAL */
journalEl.innerHTML = `<tr><th>Ticker</th><th>Result</th><th></th></tr>`;

journalData.forEach(j=>{
  journalEl.innerHTML += `
  <tr>
    <td>${j.ticker}</td>
    <td>${j.result}</td>
    <td><button onclick="deleteItem('journal','${j.id}')">X</button></td>
  </tr>`;
});

/* STAKING */
stakingEl.innerHTML = `<tr><th>Coin</th><th>Rewards</th><th></th></tr>`;

stakingData.forEach(s=>{
  let r = (Number(s.amount)||0)*(Number(s.apy)||0)/100;
  stakingRewards += r;

  stakingEl.innerHTML += `
  <tr>
    <td>${s.coin}</td>
    <td>${r.toFixed(4)}</td>
    <td><button onclick="deleteItem('staking','${s.id}')">X</button></td>
  </tr>`;
});

/* DASHBOARD */
document.getElementById("totalValue").innerText = "$"+totalValue.toFixed(2);
document.getElementById("totalPL").innerText = "$"+totalPL.toFixed(2);
document.getElementById("stakingRewards").innerText = stakingRewards.toFixed(4);

let wins = journalData.filter(j=>j.result==="Win").length;
let winRate = journalData.length ? (wins/journalData.length*100).toFixed(0) : 0;
document.getElementById("winRate").innerText = winRate+"%";

}

/* INIT */
loadAll();

</script>

</body>
</html>
