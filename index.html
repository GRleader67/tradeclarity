<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeClarity</title>

<style>
:root{
--bg:#0b0f14;
--card:#11161d;
--text:#e6edf3;
--primary:#3b82f6;
--accent:#22c55e;
--danger:#ef4444;
--border:#222a33;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
padding:20px;
}

.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tabs button{
background:#161b22;border:1px solid var(--border);
color:white;padding:6px 12px;border-radius:6px;cursor:pointer;
}
.tabs button.active{background:var(--primary);}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.form-row{
display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;
}

input,select{
padding:8px;border-radius:6px;
border:1px solid var(--border);
background:#0e131a;color:white;
}

button{
padding:8px 14px;background:var(--primary);
border:none;border-radius:6px;color:white;cursor:pointer;
}

table{width:100%;border-collapse:collapse;}
th,td{border:1px solid var(--border);padding:8px;text-align:center;}

.green{color:var(--accent)}
.red{color:var(--danger)}
.hidden{display:none}

.dashboard{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
gap:15px;margin-bottom:20px;
}

.dash-card{
background:var(--card);
padding:15px;border-radius:10px;
text-align:center;border:1px solid var(--border);
}
</style>
</head>

<body>

<h2>TradeClarity</h2>

<div class="dashboard">
<div class="dash-card"><h4>Total Value</h4><p id="totalValue">$0</p></div>
<div class="dash-card"><h4>Total P/L</h4><p id="totalPL">$0</p></div>
<div class="dash-card"><h4>Win Rate</h4><p id="winRate">0%</p></div>
<div class="dash-card"><h4>Staking Rewards</h4><p id="stakingRewards">0</p></div>
</div>

<div class="tabs">
<button onclick="showTab('stocks')" id="tab-stocks" class="active">Stocks</button>
<button onclick="showTab('crypto')" id="tab-crypto">Crypto</button>
<button onclick="showTab('options')" id="tab-options">Options</button>
<button onclick="showTab('journal')" id="tab-journal">Journal</button>
</div>

<div id="stocksPage" class="card">
<h3>Stocks</h3>
<div class="form-row">
<input id="ticker" placeholder="Ticker">
<input id="shares" type="number" placeholder="Shares">
<input id="avg" type="number" placeholder="Avg Price">
<input id="price" type="number" placeholder="Current Price">
<button onclick="handleStock()">Save</button>
</div>
<table id="stocks"></table>
</div>

<div id="cryptoPage" class="card hidden">
<h3>Crypto</h3>
<div class="form-row">
<input id="cTicker" placeholder="Coin">
<input id="cAmount" type="number">
<input id="cAvg" type="number">
<input id="cPrice" type="number">
<button onclick="handleCrypto()">Save</button>
</div>
<table id="cryptoTable"></table>

<h4>Staking</h4>
<div class="form-row">
<input id="sCoin">
<input id="sAmount" type="number">
<input id="sApy" type="number">
<button onclick="handleStaking()">Save</button>
</div>
<table id="stakingTable"></table>
</div>

<div id="optionsPage" class="card hidden">
<h3>Options</h3>
<div class="form-row">
<input id="oTicker">
<select id="oType"><option>Call</option><option>Put</option></select>
<input id="oContracts" type="number">
<input id="oEntry" type="number">
<input id="oPrice" type="number">
<button onclick="handleOptions()">Save</button>
</div>
<table id="optionsTable"></table>
</div>

<div id="journalPage" class="card hidden">
<h3>Journal</h3>
<div class="form-row">
<input id="jTicker">
<select id="jResult"><option>Win</option><option>Loss</option></select>
<input id="jNotes">
<button onclick="handleJournal()">Save</button>
</div>
<table id="journalTable"></table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyBGxTOJXxuVgke3l_V16bQqubVw7CuHgVE",
authDomain: "tradeclarity-ad869.firebaseapp.com",
projectId: "tradeclarity-ad869",
storageBucket: "tradeclarity-ad869.firebasestorage.app",
messagingSenderId: "177897129823",
appId: "1:177897129823:web:b99ef169cecbe5473558ea"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* DATA */
let stocksData=[],cryptoData=[],optionsData=[],journalData=[],stakingData=[];

/* SYNC */
async function saveAll(){
localStorage.setItem("tc",JSON.stringify({stocksData,cryptoData,optionsData,journalData,stakingData}));
await db.collection("tradeclarity").doc("main").set({stocksData,cryptoData,optionsData,journalData,stakingData});
}

async function loadAll(){
let local=JSON.parse(localStorage.getItem("tc")||"{}");
stocksData=local.stocksData||[];
cryptoData=local.cryptoData||[];
optionsData=local.optionsData||[];
journalData=local.journalData||[];
stakingData=local.stakingData||[];

try{
let doc=await db.collection("tradeclarity").doc("main").get();
if(doc.exists){
let d=doc.data();
stocksData=d.stocksData||stocksData;
cryptoData=d.cryptoData||cryptoData;
optionsData=d.optionsData||optionsData;
journalData=d.journalData||journalData;
stakingData=d.stakingData||stakingData;
}
}catch(e){}
}

/* HANDLERS */
function handleStock(){
stocksData.push({ticker:ticker.value.toUpperCase(),shares:+shares.value,avg:+avg.value,price:+price.value});
ticker.value=shares.value=avg.value=price.value="";
saveAll();render();
}

function handleCrypto(){
cryptoData.push({ticker:cTicker.value.toUpperCase(),amount:+cAmount.value,avg:+cAvg.value,price:+cPrice.value});
cTicker.value=cAmount.value=cAvg.value=cPrice.value="";
saveAll();render();
}

function handleOptions(){
optionsData.push({ticker:oTicker.value.toUpperCase(),type:oType.value,contracts:+oContracts.value,entry:+oEntry.value,price:+oPrice.value});
oTicker.value=oContracts.value=oEntry.value=oPrice.value="";
saveAll();render();
}

function handleJournal(){
journalData.push({ticker:jTicker.value.toUpperCase(),result:jResult.value,notes:jNotes.value});
jTicker.value=jNotes.value="";
saveAll();render();
}

function handleStaking(){
stakingData.push({coin:sCoin.value.toUpperCase(),amount:+sAmount.value,apy:+sApy.value});
sCoin.value=sAmount.value=sApy.value="";
saveAll();render();
}

/* TAB */
function showTab(tab){
["stocksPage","cryptoPage","optionsPage","journalPage"].forEach(id=>document.getElementById(id).classList.add("hidden"));
document.getElementById(tab+"Page").classList.remove("hidden");
}

/* RENDER (FULL RESTORED) */
function render(){

stocks.innerHTML=`<tr><th>Ticker</th><th>Shares</th><th>Cost</th><th>Value</th><th>Price</th><th>P/L</th></tr>`;
let totalValue=0,totalPL=0;

stocksData.forEach(s=>{
let value=s.shares*s.price;
let pl=(s.price-s.avg)*s.shares;
totalValue+=value; totalPL+=pl;

stocks.innerHTML+=`<tr>
<td>${s.ticker}</td>
<td>${s.shares}</td>
<td>$${s.avg}</td>
<td>$${value.toFixed(2)}</td>
<td>$${s.price}</td>
<td class="${pl>=0?'green':'red'}">$${pl.toFixed(2)}</td>
</tr>`;
});

cryptoTable.innerHTML=`<tr><th>Coin</th><th>Amount</th><th>Cost</th><th>Value</th><th>Price</th><th>P/L</th></tr>`;

cryptoData.forEach(c=>{
let value=c.amount*c.price;
let pl=(c.price-c.avg)*c.amount;
totalValue+=value; totalPL+=pl;

cryptoTable.innerHTML+=`<tr>
<td>${c.ticker}</td>
<td>${c.amount}</td>
<td>$${c.avg}</td>
<td>$${value.toFixed(2)}</td>
<td>$${c.price}</td>
<td class="${pl>=0?'green':'red'}">$${pl.toFixed(2)}</td>
</tr>`;
});

/* DASHBOARD */
document.getElementById("totalValue").innerText="$"+totalValue.toFixed(2);
document.getElementById("totalPL").innerText="$"+totalPL.toFixed(2);

}

(async()=>{
await loadAll();
render();
})();
</script>

</body>
</html>
