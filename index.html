<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TradeClarity Pro</title>

<style>
body{background:#0d1117;color:white;font-family:Arial;padding:20px}
button,input,select{margin:5px;padding:8px}
.card{background:#161b22;padding:15px;border-radius:10px;margin-bottom:15px}
.hidden{display:none}
.green{color:#2ea043}
.red{color:#da3633}
</style>
</head>

<body>

<h2>TradeClarity Pro</h2>

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<p>Total Value: <span id="totalValue">$0</span></p>
<p>Total P/L: <span id="totalPL">$0</span></p>
<p>Win Rate: <span id="winRate">0%</span></p>
<p>Best Trade: <span id="bestTrade">0</span></p>
<p>Worst Trade: <span id="worstTrade">0</span></p>
</div>

<!-- TABS -->
<div>
<button onclick="showTab('stocks')">Stocks</button>
<button onclick="showTab('crypto')">Crypto</button>
<button onclick="showTab('staking')">Staking</button>
<button onclick="showTab('options')">Options</button>
<button onclick="showTab('journal')">Journal</button>
</div>

<!-- STOCKS -->
<div id="stocks" class="card">
<input id="s_ticker" placeholder="Ticker">
<input id="s_shares" type="number" placeholder="Shares">
<input id="s_avg" type="number" placeholder="Avg">
<input id="s_price" type="number" placeholder="Price">
<button id="saveStock">Save</button>
<table id="stocksTable"></table>
</div>

<!-- CRYPTO -->
<div id="crypto" class="card hidden">
<input id="c_coin"><input id="c_amount"><input id="c_avg"><input id="c_price">
<button id="saveCrypto">Save</button>
<table id="cryptoTable"></table>
</div>

<!-- STAKING -->
<div id="staking" class="card hidden">
<input id="st_coin"><input id="st_amount"><input id="st_apy">
<button id="saveStaking">Save</button>
<table id="stakingTable"></table>
</div>

<!-- OPTIONS -->
<div id="options" class="card hidden">
<input id="o_ticker"><input id="o_contracts"><input id="o_entry"><input id="o_price">
<button id="saveOptions">Save</button>
<table id="optionsTable"></table>
</div>

<!-- JOURNAL -->
<div id="journal" class="card hidden">
<input id="j_ticker">
<select id="j_result"><option>Win</option><option>Loss</option></select>
<button id="saveJournal">Save</button>
<table id="journalTable"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBGxTOJXxuVgke3l_V16bQqubVw7CuHgVE",
  authDomain:"tradeclarity-ad869.firebaseapp.com",
  projectId:"tradeclarity-ad869"
});
const db = getFirestore(app);

/* DATA */
let stocks=[], crypto=[], staking=[], options=[], journal=[];

/* TAB */
window.showTab=(t)=>{
["stocks","crypto","staking","options","journal"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(t).classList.remove("hidden");
};

/* SAVE HANDLERS */
document.getElementById("saveStock").onclick=async()=>{
try{
await addDoc(collection(db,"stocks"),{
ticker:s_ticker.value,shares:+s_shares.value,avg:+s_avg.value,price:+s_price.value
});
load();
}catch(e){alert("Firebase blocked: fix rules");}
};

document.getElementById("saveCrypto").onclick=async()=>{
await addDoc(collection(db,"crypto"),{coin:c_coin.value,amount:+c_amount.value,avg:+c_avg.value,price:+c_price.value});load();
};

document.getElementById("saveStaking").onclick=async()=>{
await addDoc(collection(db,"staking"),{coin:st_coin.value,amount:+st_amount.value,apy:+st_apy.value});load();
};

document.getElementById("saveOptions").onclick=async()=>{
await addDoc(collection(db,"options"),{ticker:o_ticker.value,contracts:+o_contracts.value,entry:+o_entry.value,price:+o_price.value});load();
};

document.getElementById("saveJournal").onclick=async()=>{
await addDoc(collection(db,"journal"),{ticker:j_ticker.value,result:j_result.value});load();
};

/* LOAD */
async function load(){
stocks=(await getDocs(collection(db,"stocks"))).docs.map(d=>d.data());
crypto=(await getDocs(collection(db,"crypto"))).docs.map(d=>d.data());
staking=(await getDocs(collection(db,"staking"))).docs.map(d=>d.data());
options=(await getDocs(collection(db,"options"))).docs.map(d=>d.data());
journal=(await getDocs(collection(db,"journal"))).docs.map(d=>d.data());
render();
}

/* RENDER + ANALYTICS */
function render(){

let total=0,pl=0,best=-999999,worst=999999;

stocksTable.innerHTML="";
stocks.forEach(s=>{
let p=(s.price-s.avg)*s.shares;
total+=s.price*s.shares; pl+=p;
best=Math.max(best,p); worst=Math.min(worst,p);
stocksTable.innerHTML+=`<tr><td>${s.ticker}</td><td>${p.toFixed(2)}</td></tr>`;
});

/* DASH */
totalValue.innerText="$"+total.toFixed(2);
totalPL.innerText="$"+pl.toFixed(2);

let wins=journal.filter(j=>j.result==="Win").length;
winRate.innerText=journal.length?Math.round(wins/journal.length*100)+"%":"0%";

bestTrade.innerText=best.toFixed(2);
worstTrade.innerText=worst.toFixed(2);
}

load();

</script>

</body>
</html>
