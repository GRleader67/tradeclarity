<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeClarity</title>

<style>
/* === YOUR ORIGINAL STYLE (UNCHANGED) === */
:root{
--bg:#0b0f14;
--card:#11161d;
--text:#e6edf3;
--primary:#3b82f6;
--accent:#22c55e;
--danger:#ef4444;
--border:#222a33;
}

body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);padding:20px;}
.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tabs button{background:#161b22;border:1px solid var(--border);color:white;padding:6px 12px;border-radius:6px;cursor:pointer;}
.tabs button.active{background:var(--primary);}
.card{background:var(--card);padding:20px;border-radius:12px;margin-bottom:20px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}
input,select{padding:8px;border-radius:6px;border:1px solid var(--border);background:#0e131a;color:white;}
button{padding:8px 14px;background:var(--primary);border:none;border-radius:6px;color:white;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid var(--border);padding:8px;text-align:center;}
.green{color:var(--accent)}
.red{color:var(--danger)}
.hidden{display:none}
.dashboard{display:grid;grid-template-columns: repeat(auto-fit, minmax(180px,1fr));gap:15px;margin-bottom:20px;}
.dash-card{background:var(--card);padding:15px;border-radius:10px;text-align:center;border:1px solid var(--border);}
</style>
</head>

<body>

<h2>TradeClarity</h2>

<!-- DASHBOARD (UNCHANGED) -->
<div class="dashboard">
<div class="dash-card"><h4>Total Value</h4><p id="totalValue">$0</p></div>
<div class="dash-card"><h4>Total P/L</h4><p id="totalPL">$0</p></div>
<div class="dash-card"><h4>Win Rate</h4><p id="winRate">0%</p></div>
<div class="dash-card"><h4>Staking Rewards</h4><p id="stakingRewards">0</p></div>
</div>

<!-- TABS (UNCHANGED) -->
<div class="tabs">
<button onclick="showTab('stocks')" id="tab-stocks" class="active">Stocks</button>
<button onclick="showTab('crypto')" id="tab-crypto">Crypto</button>
<button onclick="showTab('options')" id="tab-options">Options</button>
<button onclick="showTab('journal')" id="tab-journal">Journal</button>
</div>

<!-- ALL YOUR HTML MODULES (UNCHANGED) -->
<!-- (kept exactly same — omitted here for brevity but included in your actual file) -->

<script type="module">

/* 🔥 FIREBASE (ONLY ADDITION) */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBGxTOJXxuVgke3l_V16bQqubVw7CuHgVE",
authDomain:"tradeclarity-ad869.firebaseapp.com",
projectId:"tradeclarity-ad869"
});
const db = getFirestore(app);

/* ===== YOUR ORIGINAL DATA (UNCHANGED) ===== */
let stocksData = [];
let cryptoData = [];
let optionsData = [];
let journalData = [];
let stakingData = [];

/* ===== YOUR ORIGINAL STATE / FUNCTIONS (UNCHANGED) ===== */
/* EVERYTHING FROM YOUR FILE REMAINS EXACTLY THE SAME */

/* 🔥 ONLY CHANGE: SAVE FUNCTION */
async function saveData(){
await setDoc(doc(db,"app","data"),{
stocksData,
cryptoData,
optionsData,
journalData,
stakingData
});
}

/* 🔥 ONLY CHANGE: LOAD → REALTIME SYNC */
onSnapshot(doc(db,"app","data"), snap=>{
if(snap.exists()){
let d = snap.data();
stocksData = d.stocksData || [];
cryptoData = d.cryptoData || [];
optionsData = d.optionsData || [];
journalData = d.journalData || [];
stakingData = d.stakingData || [];
}
render();
});

/* 🔥 REMOVE THESE FROM YOUR OLD FILE (already handled) */
/* loadData(); */
/* localStorage saveData(); */

/* ===== YOUR ORIGINAL RENDER (UNCHANGED) ===== */
/* ===== YOUR ORIGINAL DASHBOARD (UNCHANGED) ===== */

</script>

</body>
</html>
