<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradeClarity Pro</title>

<style>
:root{
  --primary:#238636;
  --border:#30363d;
  --card:#161b22;
  --accent:#2ea043;
  --danger:#da3633;
}

body{
  font-family:Arial;
  background:#0d1117;
  color:white;
  padding:20px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tabs button{
  background:#161b22;
  border:1px solid var(--border);
  color:white;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.tabs button.active{
  background:var(--primary);
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.hidden{display:none}

input,select{
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#0e131a;
  color:white;
}

button{
  padding:8px 14px;
  background:var(--primary);
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid var(--border);
  padding:8px;
  text-align:center;
}

.green{color:var(--accent)}
.red{color:var(--danger)}

.dashboard{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.dash-card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<h2>TradeClarity Pro</h2>

<div class="dashboard">
  <div class="dash-card"><h4>Total Value</h4><p id="totalValue">$0</p></div>
  <div class="dash-card"><h4>Total P/L</h4><p id="totalPL">$0</p></div>
  <div class="dash-card"><h4>Win Rate</h4><p id="winRate">0%</p></div>
  <div class="dash-card"><h4>Staking Rewards</h4><p id="stakingRewards">0</p></div>
</div>

<div class="tabs">
<button id="tab-stocks">Stocks</button>
<button id="tab-crypto">Crypto</button>
<button id="tab-staking">Staking</button>
<button id="tab-options">Options</button>
<button id="tab-journal">Journal</button>
</div>

<div id="stocksPage" class="card"></div>
<div id="cryptoPage" class="card hidden"></div>
<div id="stakingPage" class="card hidden"></div>
<div id="optionsPage" class="card hidden"></div>
<div id="journalPage" class="card hidden"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = { 
  apiKey: "AIzaSyBGxTOJXxuVgke3l_V16bQqubVw7CuHgVE",
  authDomain: "tradeclarity-ad869.firebaseapp.com",
  projectId: "tradeclarity-ad869"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DATA */
let stocks=[], crypto=[], staking=[], options=[], journal=[];

/* TAB SYSTEM */
const tabs=["stocks","crypto","staking","options","journal"];

tabs.forEach(t=>{
document.getElementById("tab-"+t).onclick=()=>{
tabs.forEach(x=>{
document.getElementById(x+"Page").classList.add("hidden");
document.getElementById("tab-"+x).classList.remove("active");
});
document.getElementById(t+"Page").classList.remove("hidden");
document.getElementById("tab-"+t).classList.add("active");
};
});

/* BUILD UI */
function buildForms(){

stocksPage.innerHTML=`
<input id="s_ticker"><input id="s_shares"><input id="s_avg"><input id="s_price">
<button onclick="addStock()">Save</button>
<table id="stocksTable"></table>`;

cryptoPage.innerHTML=`
<input id="c_coin"><input id="c_amount"><input id="c_avg"><input id="c_price">
<button onclick="addCrypto()">Save</button>
<table id="cryptoTable"></table>`;

stakingPage.innerHTML=`
<input id="st_coin"><input id="st_amount"><input id="st_apy">
<button onclick="addStaking()">Save</button>
<table id="stakingTable"></table>`;

optionsPage.innerHTML=`
<input id="o_ticker"><input id="o_contracts"><input id="o_entry"><input id="o_price">
<button onclick="addOption()">Save</button>
<table id="optionsTable"></table>`;

journalPage.innerHTML=`
<input id="j_ticker"><select id="j_result"><option>Win</option><option>Loss</option></select>
<button onclick="addJournal()">Save</button>
<table id="journalTable"></table>`;
}

/* ADD FUNCTIONS */
window.addStock=()=>save("stocks",{ticker:s_ticker.value,shares:+s_shares.value,avg:+s_avg.value,price:+s_price.value});
window.addCrypto=()=>save("crypto",{coin:c_coin.value,amount:+c_amount.value,avg:+c_avg.value,price:+c_price.value});
window.addStaking=()=>save("staking",{coin:st_coin.value,amount:+st_amount.value,apy:+st_apy.value});
window.addOption=()=>save("options",{ticker:o_ticker.value,contracts:+o_contracts.value,entry:+o_entry.value,price:+o_price.value});
window.addJournal=()=>save("journal",{ticker:j_ticker.value,result:j_result.value});

/* SAVE */
async function save(col,data){
let ref=await addDoc(collection(db,col),data);
data.id=ref.id;
eval(col).push(data);
render();
}

/* LOAD */
async function load(){
stocks=(await getDocs(collection(db,"stocks"))).docs.map(d=>({...d.data(),id:d.id}));
crypto=(await getDocs(collection(db,"crypto"))).docs.map(d=>({...d.data(),id:d.id}));
staking=(await getDocs(collection(db,"staking"))).docs.map(d=>({...d.data(),id:d.id}));
options=(await getDocs(collection(db,"options"))).docs.map(d=>({...d.data(),id:d.id}));
journal=(await getDocs(collection(db,"journal"))).docs.map(d=>({...d.data(),id:d.id}));
render();
}

/* DELETE */
window.del=(col,id)=>{deleteDoc(doc(db,col,id));load();};

/* RENDER */
function render(){

stocksTable.innerHTML="<tr><th>Ticker</th><th>P/L</th><th></th></tr>";
stocks.forEach(s=>{
let pl=(s.price-s.avg)*s.shares;
stocksTable.innerHTML+=`<tr><td>${s.ticker}</td><td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td><td><button onclick="del('stocks','${s.id}')">X</button></td></tr>`;
});

cryptoTable.innerHTML="<tr><th>Coin</th><th>P/L</th><th></th></tr>";
crypto.forEach(c=>{
let pl=(c.price-c.avg)*c.amount;
cryptoTable.innerHTML+=`<tr><td>${c.coin}</td><td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td><td><button onclick="del('crypto','${c.id}')">X</button></td></tr>`;
});

stakingTable.innerHTML="<tr><th>Coin</th><th>Rewards</th><th></th></tr>";
staking.forEach(s=>{
let r=s.amount*(s.apy/100);
stakingTable.innerHTML+=`<tr><td>${s.coin}</td><td>${r.toFixed(4)}</td><td><button onclick="del('staking','${s.id}')">X</button></td></tr>`;
});

optionsTable.innerHTML="<tr><th>Ticker</th><th>P/L</th><th></th></tr>";
options.forEach(o=>{
let pl=(o.price-o.entry)*o.contracts*100;
optionsTable.innerHTML+=`<tr><td>${o.ticker}</td><td class="${pl>=0?'green':'red'}">${pl.toFixed(2)}</td><td><button onclick="del('options','${o.id}')">X</button></td></tr>`;
});

journalTable.innerHTML="<tr><th>Ticker</th><th>Result</th><th></th></tr>";
journal.forEach(j=>{
journalTable.innerHTML+=`<tr><td>${j.ticker}</td><td>${j.result}</td><td><button onclick="del('journal','${j.id}')">X</button></td></tr>`;
});

/* DASHBOARD */
let total=0,pl=0,stake=0;
stocks.forEach(s=>{total+=s.shares*s.price;pl+=(s.price-s.avg)*s.shares;});
crypto.forEach(c=>{total+=c.amount*c.price;pl+=(c.price-c.avg)*c.amount;});
options.forEach(o=>{let v=o.contracts*100*o.price;let c=o.contracts*100*o.entry;total+=v;pl+=v-c;});
staking.forEach(s=>stake+=s.amount*(s.apy/100));

let wins=journal.filter(j=>j.result==="Win").length;
let winRate=journal.length?((wins/journal.length)*100).toFixed(0):0;

totalValue.innerText="$"+total.toFixed(2);
totalPL.innerText="$"+pl.toFixed(2);
stakingRewards.innerText=stake.toFixed(4);
winRate.innerText=winRate+"%";
}

buildForms();
load();

</script>

</body>
</html>
